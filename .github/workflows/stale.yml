name: Stale issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 14 days unless there is new activity. Comment to keep it open.
          close-issue-message: |
            Closing due to inactivity. Reopen if this is still relevant.
          exempt-issue-labels: pinned,security,help-wanted

          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: |
            This PR has been inactive for 30 days. It will be closed in 14 days unless there is new activity.
          close-pr-message: |
            Closing due to inactivity. Reopen and rebase if you want to continue.
          exempt-pr-labels: pinned,dependencies
