# Dependabot config for rbac-visualizer.
# Public repo, so security alerts are on automatically; this file adds
# version-update PRs on a weekly cadence. Mirrors the image-explorer setup.
version: 2
updates:
  # NPM deps for the Vite/React renderer.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bratislava
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite-toolchain:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      reactflow:
        patterns:
          - "reactflow"
          - "@reactflow/*"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react"
          - "@types/react-dom"

  # GitHub Actions workflow pins.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bratislava
    open-pull-requests-limit: 4
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)

  # Docker base image bumps.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore(docker)
