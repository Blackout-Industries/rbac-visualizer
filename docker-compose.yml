services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  # Production build — usage: docker compose --profile prod up prod
  prod:
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
    profiles:
      - prod
